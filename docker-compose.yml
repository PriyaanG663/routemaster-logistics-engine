version: '3.8'

services:
  # 1. The Database
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # 2. The Node.js Backend
  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/routemaster
    depends_on:
      - mongodb

  client:
    build: ./client
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    depends_on:
      - server

volumes:
  mongo-data:
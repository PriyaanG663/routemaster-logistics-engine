name: RouteMaster CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Build and Verify the MERN Stack code
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build Frontend (Navigate directly to subfolder)
      - name: Build Frontend
        working-directory: ./client
        run: |
          npm install
          npm run build

      # Install Backend (Navigate directly to subfolder)
      - name: Install Backend Dependencies
        working-directory: ./server
        run: npm install

  # Job 2: Verify Docker Orchestration
  docker-check:
    runs-on: ubuntu-latest
    needs: build-and-verify
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Compose Configuration
        run: docker compose config

      - name: Build Docker Images
        run: docker compose build